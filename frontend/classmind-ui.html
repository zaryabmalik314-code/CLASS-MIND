<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ClassMind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #121110;
    --surface: #1c1a16;
    --surface-raised: #232019;
    --rule: #322d22;
    --rule-soft: #2a2620;
    --accent: #d9a441;
    --accent-soft: rgba(217, 164, 65, 0.14);
    --accent-dim: rgba(217, 164, 65, 0.55);
    --text-primary: #f2ede1;
    --text-secondary: #a89f8c;
    --text-muted: #625c4d;
    --error: #c2634a;
    --error-soft: rgba(194, 99, 74, 0.12);
  }
  html, body { margin: 0; padding: 0; background: var(--ink); }
  * { box-sizing: border-box; }
  ::selection { background: var(--accent-soft); color: var(--text-primary); }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes riseIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  button:focus-visible, input:focus-visible, div[tabindex]:focus-visible {
    outline: 2px solid var(--accent-dim);
    outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; }
  }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// Point this at your deployed FastAPI (api.py) service.
const API_BASE_URL = "https://delightful-enchantment-production-2a8a.up.railway.app";

const FONT_SERIF = "'Source Serif 4', Georgia, serif";
const FONT_SANS = "'Inter', -apple-system, sans-serif";
const FONT_MONO = "'IBM Plex Mono', monospace";

// ---- Ruled-paper texture: a faint repeating horizontal line, like notebook paper ----
const ruledPaper = {
  backgroundImage: "repeating-linear-gradient(to bottom, transparent, transparent 27px, rgba(50,45,34,0.35) 28px)",
  backgroundPosition: "0 4px",
};

// ---- Inline icon components (replacing lucide-react for CDN use) ----
function Icon({ children, size = 18, color = "currentColor", style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>
  );
}
const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9" /></Icon>;
const HomeIcon = (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></Icon>;
const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></Icon>;
const MessageCircle = (p) => <Icon {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" /></Icon>;
const Sparkles = (p) => <Icon {...p}><path d="M12 3l1.6 4.8L18 9l-4.4 1.2L12 15l-1.6-4.8L6 9l4.4-1.2z" /></Icon>;
const RefreshCw = (p) => <Icon {...p}><polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></Icon>;
const AlertIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></Icon>;

function renderMarkdown(md) {
  const lines = md.split("\n");
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith("```")) {
      const code = [];
      i++;
      while (i < lines.length && !lines[i].startsWith("```")) {
        code.push(lines[i]);
        i++;
      }
      blocks.push({ type: "code", content: code.join("\n") });
      i++;
      continue;
    }
    if (line.startsWith("### ")) blocks.push({ type: "h3", content: line.slice(4) });
    else if (line.startsWith("## ")) blocks.push({ type: "h2", content: line.slice(3) });
    else if (line.startsWith("# ")) blocks.push({ type: "h1", content: line.slice(2) });
    else if (line.startsWith("- ")) blocks.push({ type: "li", content: line.slice(2) });
    else if (/^\d+\. /.test(line)) blocks.push({ type: "oli", content: line.replace(/^\d+\. /, "") });
    else if (line.trim() === "") blocks.push({ type: "space" });
    else blocks.push({ type: "p", content: line });
    i++;
  }
  return blocks;
}

function inline(text) {
  const parts = [];
  const regex = /(\*\*.+?\*\*|\$\$.+?\$\$|\$.+?\$)/g;
  let last = 0;
  let m;
  let key = 0;
  while ((m = regex.exec(text))) {
    if (m.index > last) parts.push(text.slice(last, m.index));
    const token = m[0];
    if (token.startsWith("**")) parts.push(<b key={key++} style={{ fontWeight: 600, color: "var(--text-primary)" }}>{token.slice(2, -2)}</b>);
    else parts.push(<span key={key++} style={{ fontFamily: FONT_SERIF, fontStyle: "italic", color: "var(--accent)" }}>{token.replace(/\$\$?/g, "")}</span>);
    last = m.index + token.length;
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts;
}

function Markdown({ content }) {
  const blocks = renderMarkdown(content);
  return (
    <div>
      {blocks.map((b, idx) => {
        if (b.type === "h1") return <h1 key={idx} style={{ fontSize: 21, fontWeight: 600, margin: "0 0 14px", color: "var(--text-primary)", fontFamily: FONT_SERIF, letterSpacing: -0.2 }}>{b.content}</h1>;
        if (b.type === "h2") return <h2 key={idx} style={{ fontSize: 16.5, fontWeight: 600, margin: "22px 0 10px", color: "var(--text-primary)", fontFamily: FONT_SERIF, letterSpacing: -0.1 }}>{b.content}</h2>;
        if (b.type === "h3") return <h3 key={idx} style={{ fontSize: 14, fontWeight: 700, margin: "16px 0 6px", color: "var(--text-secondary)", fontFamily: FONT_SANS, textTransform: "uppercase", letterSpacing: 0.6 }}>{b.content}</h3>;
        if (b.type === "li") return <div key={idx} style={{ display: "flex", gap: 8, margin: "4px 0", fontSize: 14.5, lineHeight: 1.7, color: "var(--text-secondary)" }}><span style={{ color: "var(--accent)" }}>—</span><span>{inline(b.content)}</span></div>;
        if (b.type === "oli") return <div key={idx} style={{ display: "flex", gap: 8, margin: "4px 0", fontSize: 14.5, lineHeight: 1.7, color: "var(--text-secondary)" }}><span style={{ color: "var(--accent)" }}>—</span><span>{inline(b.content)}</span></div>;
        if (b.type === "code") return <pre key={idx} style={{ background: "var(--ink)", border: "1px solid var(--rule)", borderRadius: 6, padding: "10px 12px", fontSize: 12.5, overflowX: "auto", color: "var(--text-secondary)", fontFamily: FONT_MONO, margin: "8px 0" }}>{b.content}</pre>;
        if (b.type === "space") return <div key={idx} style={{ height: 4 }} />;
        return <p key={idx} style={{ fontSize: 14.5, lineHeight: 1.75, color: "var(--text-secondary)", margin: "6px 0", fontFamily: FONT_SERIF }}>{inline(b.content)}</p>;
      })}
    </div>
  );
}

function QuizCard({ q, index }) {
  const [open, setOpen] = useState(false);
  return (
    <button
      onClick={() => setOpen(!open)}
      style={{
        display: "block", width: "100%", textAlign: "left", background: "var(--surface)",
        border: `1px solid ${open ? "var(--accent-dim)" : "var(--rule)"}`, borderRadius: 8,
        padding: "13px 15px 13px 42px", marginBottom: 9, cursor: "pointer", position: "relative",
        transition: "border-color 0.15s ease",
      }}
    >
      <span style={{
        position: "absolute", left: 14, top: 13, fontFamily: FONT_MONO, fontSize: 11,
        fontWeight: 600, color: open ? "var(--accent)" : "var(--text-muted)",
      }}>{String(index + 1).padStart(2, "0")}</span>
      <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text-primary)", marginBottom: open ? 8 : 0, fontFamily: FONT_SANS }}>{q.question}</div>
      {open && (
        <div style={{ fontSize: 13.5, color: "var(--text-secondary)", lineHeight: 1.6, paddingTop: 8, borderTop: "1px solid var(--rule-soft)", fontFamily: FONT_SERIF }}>
          {q.answer}
        </div>
      )}
      {!open && <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginTop: 4, fontFamily: FONT_SANS }}>tap to reveal answer</div>}
    </button>
  );
}

function CourseStamp({ children }) {
  return (
    <span style={{
      display: "inline-block", fontFamily: FONT_MONO, fontSize: 10.5, fontWeight: 600,
      color: "var(--accent)", letterSpacing: 0.5, textTransform: "uppercase",
      border: "1px solid var(--accent-dim)", borderRadius: 4, padding: "2px 7px",
      background: "var(--accent-soft)",
    }}>{children}</span>
  );
}

function LectureCard({ lecture, onOpen }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div
      style={{
        background: "var(--surface)", border: "1px solid var(--rule)", borderRadius: 10,
        borderLeft: "3px solid var(--accent-dim)",
        padding: "14px 16px", marginBottom: 11, position: "relative",
        animation: "riseIn 0.3s ease both",
      }}
    >
      <div onClick={() => onOpen(lecture)} style={{ cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <CourseStamp>{lecture.course}</CourseStamp>
          <span style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: FONT_MONO }}>{lecture.date}</span>
        </div>
        <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text-primary)", marginBottom: 8, fontFamily: FONT_SERIF, letterSpacing: -0.1, lineHeight: 1.3 }}>
          {lecture.lecture_title}
        </div>
      </div>
      <button
        onClick={() => setExpanded(!expanded)}
        style={{
          display: "flex", alignItems: "center", gap: 4, background: "none", border: "none",
          color: "var(--text-secondary)", fontSize: 12, padding: 0, cursor: "pointer",
          marginBottom: expanded ? 8 : 0, fontFamily: FONT_SANS, fontWeight: 500,
        }}
      >
        {expanded ? <ChevronDown size={13} /> : <ChevronRight size={13} />}
        highlights
      </button>
      {expanded && (
        <div style={{ marginBottom: 8, paddingLeft: 2 }}>
          {lecture.highlights.slice(0, 3).map((h, i) => (
            <div key={i} style={{ display: "flex", gap: 6, fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.6, marginBottom: 3, fontFamily: FONT_SANS }}>
              <span style={{ color: "var(--accent)" }}>·</span><span>{h}</span>
            </div>
          ))}
        </div>
      )}
      <div onClick={() => onOpen(lecture)} style={{ display: "flex", alignItems: "center", gap: 4, color: "var(--accent)", fontSize: 12.5, fontWeight: 600, cursor: "pointer", marginTop: 4, fontFamily: FONT_SANS }}>
        open notes <ChevronRight size={13} />
      </div>
    </div>
  );
}

function LectureDetail({ lecture, onBack }) {
  const [highlightsOpen, setHighlightsOpen] = useState(true);
  return (
    <div style={{ padding: "16px 16px 32px" }}>
      <div onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 4, color: "var(--text-secondary)", fontSize: 13, marginBottom: 16, cursor: "pointer", fontFamily: FONT_SANS, fontWeight: 500 }}>
        <ChevronRight size={14} style={{ transform: "rotate(180deg)" }} /> back
      </div>
      <CourseStamp>{lecture.course}</CourseStamp>
      <div style={{ fontSize: 21, fontWeight: 600, color: "var(--text-primary)", margin: "10px 0 3px", fontFamily: FONT_SERIF, letterSpacing: -0.2, lineHeight: 1.25 }}>{lecture.lecture_title}</div>
      <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginBottom: 20, fontFamily: FONT_MONO }}>{lecture.date}</div>

      <div
        style={{
          background: "var(--surface)", border: "1px solid var(--accent-dim)", borderRadius: 10,
          padding: "12px 16px", marginBottom: 22, ...ruledPaper,
        }}
      >
        <button
          onClick={() => setHighlightsOpen(!highlightsOpen)}
          style={{ display: "flex", alignItems: "center", gap: 6, width: "100%", background: "none", border: "none", cursor: "pointer", padding: 0, color: "var(--accent)", fontSize: 12.5, fontWeight: 700, fontFamily: FONT_SANS, textTransform: "uppercase", letterSpacing: 0.5 }}
        >
          <Sparkles size={13} /> highlights {highlightsOpen ? <ChevronDown size={14} style={{ marginLeft: "auto" }} /> : <ChevronRight size={14} style={{ marginLeft: "auto" }} />}
        </button>
        {highlightsOpen && (
          <div style={{ marginTop: 10 }}>
            {lecture.highlights.map((h, i) => (
              <div key={i} style={{ display: "flex", gap: 6, fontSize: 13.5, color: "var(--text-primary)", lineHeight: 1.65, marginBottom: 5, fontFamily: FONT_SANS }}>
                <span style={{ color: "var(--accent)" }}>·</span><span>{h}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <Markdown content={lecture.notes} />

      <div style={{ marginTop: 30 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 13 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text-primary)", fontFamily: FONT_SERIF }}>Quiz</div>
          <div style={{ fontSize: 11.5, color: "var(--text-muted)", fontFamily: FONT_MONO }}>{lecture.quiz.length} questions</div>
        </div>
        {lecture.quiz.map((q, i) => <QuizCard key={i} q={q} index={i} />)}
      </div>
    </div>
  );
}

function SectionHeader({ children, sub }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 22, fontWeight: 600, color: "var(--text-primary)", fontFamily: FONT_SERIF, letterSpacing: -0.3 }}>{children}</div>
      {sub && <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 3, fontFamily: FONT_MONO }}>{sub}</div>}
    </div>
  );
}

function EmptyState({ label }) {
  return (
    <div style={{ border: "1px dashed var(--rule)", borderRadius: 10, padding: "26px 20px", textAlign: "center", color: "var(--text-muted)", fontSize: 13, fontFamily: FONT_SANS }}>
      {label}
    </div>
  );
}

function Home({ onOpen, lectures }) {
  const sorted = [...lectures].sort((a, b) => new Date(b.date) - new Date(a.date));
  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <SectionHeader sub={`${lectures.length} lecture${lectures.length !== 1 ? "s" : ""} processed`}>ClassMind</SectionHeader>
      {sorted.length === 0 && <EmptyState label="No lectures processed yet." />}
      {sorted.map((l) => <LectureCard key={l.id} lecture={l} onOpen={onOpen} />)}
    </div>
  );
}

function Courses({ onOpenCourse, lectures }) {
  const counts = {};
  lectures.forEach((l) => { counts[l.course] = (counts[l.course] || 0) + 1; });
  const courseNames = Object.keys(counts);
  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <SectionHeader>Courses</SectionHeader>
      {courseNames.length === 0 && <EmptyState label="No courses yet." />}
      {courseNames.map((c) => {
        const count = counts[c];
        return (
          <div
            key={c}
            onClick={() => onOpenCourse(c)}
            style={{
              background: "var(--surface)", border: "1px solid var(--rule)", borderRadius: 10,
              borderLeft: "3px solid var(--accent-dim)",
              padding: "14px 16px", marginBottom: 10, cursor: "pointer",
              display: "flex", justifyContent: "space-between", alignItems: "center",
            }}
          >
            <div>
              <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text-primary)", fontFamily: FONT_SERIF }}>{c}</div>
              <div style={{ fontSize: 11.5, color: "var(--text-muted)", marginTop: 3, fontFamily: FONT_MONO }}>{count} lecture{count !== 1 ? "s" : ""}</div>
            </div>
            <ChevronRight size={16} color="var(--text-muted)" />
          </div>
        );
      })}
    </div>
  );
}

function CourseDetail({ course, onBack, onOpenLecture, lectures }) {
  const filtered = lectures.filter((l) => l.course === course).sort((a, b) => new Date(b.date) - new Date(a.date));
  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <div onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 4, color: "var(--text-secondary)", fontSize: 13, marginBottom: 16, cursor: "pointer", fontFamily: FONT_SANS, fontWeight: 500 }}>
        <ChevronRight size={14} style={{ transform: "rotate(180deg)" }} /> all courses
      </div>
      <SectionHeader>{course}</SectionHeader>
      {filtered.length === 0 && <EmptyState label="No lectures processed yet." />}
      {filtered.map((l) => <LectureCard key={l.id} lecture={l} onOpen={onOpenLecture} />)}
    </div>
  );
}

function Chat() {
  return (
    <div style={{ padding: "18px 16px 8px", display: "flex", flexDirection: "column", minHeight: 420 }}>
      <SectionHeader>Chat</SectionHeader>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", padding: "0 24px" }}>
        <div style={{ width: 46, height: 46, borderRadius: 8, background: "var(--accent-soft)", border: "1px solid var(--accent-dim)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
          <MessageCircle size={19} color="var(--accent)" />
        </div>
        <div style={{ fontSize: 14, color: "var(--text-secondary)", lineHeight: 1.6, fontFamily: FONT_SANS }}>Ask questions about your lectures — coming soon.</div>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", background: "var(--surface)", border: "1px solid var(--rule)", borderRadius: 10, padding: "11px 16px" }}>
        <input
          disabled
          placeholder="Ask about a lecture..."
          style={{ flex: 1, background: "none", border: "none", outline: "none", color: "var(--text-muted)", fontSize: 13.5, fontFamily: FONT_SANS }}
        />
      </div>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div style={{ minHeight: 420, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
      <RefreshCw size={20} color="var(--accent)" style={{ animation: "spin 1s linear infinite" }} />
      <div style={{ fontSize: 12.5, color: "var(--text-muted)", fontFamily: FONT_MONO, letterSpacing: 0.3 }}>loading lectures…</div>
    </div>
  );
}

function ErrorScreen({ message, onRetry }) {
  return (
    <div style={{ minHeight: 420, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, padding: "0 28px", textAlign: "center" }}>
      <div style={{ width: 40, height: 40, borderRadius: 8, background: "var(--error-soft)", border: "1px solid var(--error)", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <AlertIcon size={18} color="var(--error)" />
      </div>
      <div style={{ fontSize: 14, color: "var(--text-primary)", fontWeight: 600, fontFamily: FONT_SANS }}>Couldn't reach ClassMind</div>
      <div style={{ fontSize: 12.5, color: "var(--text-muted)", lineHeight: 1.6, fontFamily: FONT_SANS }}>{message}</div>
      <button
        onClick={onRetry}
        style={{ marginTop: 6, background: "var(--surface)", border: "1px solid var(--rule)", borderRadius: 8, padding: "8px 18px", color: "var(--accent)", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: FONT_SANS }}
      >
        Retry
      </button>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("home");
  const [openLecture, setOpenLecture] = useState(null);
  const [openCourse, setOpenCourse] = useState(null);
  const [lectures, setLectures] = useState([]);
  const [status, setStatus] = useState("loading"); // loading | ready | error
  const [errorMsg, setErrorMsg] = useState("");

  const fetchLectures = () => {
    setStatus("loading");
    fetch(`${API_BASE_URL}/api/lectures`)
      .then((res) => {
        if (!res.ok) throw new Error(`Server responded ${res.status}`);
        return res.json();
      })
      .then((data) => {
        setLectures(data);
        setStatus("ready");
      })
      .catch((err) => {
        setErrorMsg(err.message || "Network error");
        setStatus("error");
      });
  };

  useEffect(() => {
    fetchLectures();
  }, []);

  useEffect(() => {
    if (openLecture) {
      const fresh = lectures.find((l) => l.id === openLecture.id);
      if (fresh) setOpenLecture(fresh);
    }
  }, [lectures]);

  const tabs = [
    { id: "home", label: "Home", icon: HomeIcon },
    { id: "courses", label: "Courses", icon: BookOpen },
    { id: "chat", label: "Chat", icon: MessageCircle },
  ];

  const handleTab = (id) => {
    setTab(id);
    setOpenLecture(null);
    setOpenCourse(null);
  };

  let body;
  if (status === "loading") body = <LoadingScreen />;
  else if (status === "error") body = <ErrorScreen message={errorMsg} onRetry={fetchLectures} />;
  else if (openLecture) body = <LectureDetail lecture={openLecture} onBack={() => setOpenLecture(null)} />;
  else if (tab === "home") body = <Home onOpen={setOpenLecture} lectures={lectures} />;
  else if (tab === "courses") body = openCourse
    ? <CourseDetail course={openCourse} onBack={() => setOpenCourse(null)} onOpenLecture={setOpenLecture} lectures={lectures} />
    : <Courses onOpenCourse={setOpenCourse} lectures={lectures} />;
  else if (tab === "chat") body = <Chat />;

  return (
    <div style={{ maxWidth: 400, margin: "0 auto", background: "var(--ink)", minHeight: "100vh", fontFamily: FONT_SANS, position: "relative" }}>
      <div style={{ paddingBottom: 74 }}>{body}</div>
      {!openLecture && (
        <div
          style={{
            position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: "100%", maxWidth: 400, background: "var(--surface)",
            borderTop: "1px solid var(--rule)", display: "flex",
          }}
        >
          {tabs.map((t) => {
            const IconComp = t.icon;
            const active = tab === t.id;
            return (
              <button
                key={t.id}
                onClick={() => handleTab(t.id)}
                style={{
                  flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                  padding: "11px 0 9px", background: "none", border: "none", cursor: "pointer",
                  color: active ? "var(--accent)" : "var(--text-muted)", position: "relative",
                }}
              >
                <IconComp size={19} />
                <span style={{ fontSize: 10, fontWeight: active ? 600 : 500, fontFamily: FONT_SANS, letterSpacing: 0.2 }}>{t.label}</span>
                {active && <span style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 22, height: 2, background: "var(--accent)", borderRadius: 2 }} />}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>

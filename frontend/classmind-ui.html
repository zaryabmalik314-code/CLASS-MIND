<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ClassMind</title>
<style>
  html, body { margin: 0; padding: 0; background: #151310; }
  * { box-sizing: border-box; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// Point this at your deployed FastAPI (api.py) service.
const API_BASE_URL = "https://delightful-enchantment-production-2a8a.up.railway.app";

// ---- Inline icon components (replacing lucide-react for CDN use) ----
function Icon({ children, size = 18, color = "currentColor", style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>
  );
}
const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9" /></Icon>;
const HomeIcon = (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></Icon>;
const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></Icon>;
const MessageCircle = (p) => <Icon {...p}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" /></Icon>;
const Sparkles = (p) => <Icon {...p}><path d="M12 3l1.6 4.8L18 9l-4.4 1.2L12 15l-1.6-4.8L6 9l4.4-1.2z" /></Icon>;
const RefreshCw = (p) => <Icon {...p}><polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></Icon>;

function renderMarkdown(md) {
  const lines = md.split("\n");
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (line.startsWith("```")) {
      const code = [];
      i++;
      while (i < lines.length && !lines[i].startsWith("```")) {
        code.push(lines[i]);
        i++;
      }
      blocks.push({ type: "code", content: code.join("\n") });
      i++;
      continue;
    }
    if (line.startsWith("### ")) blocks.push({ type: "h3", content: line.slice(4) });
    else if (line.startsWith("## ")) blocks.push({ type: "h2", content: line.slice(3) });
    else if (line.startsWith("# ")) blocks.push({ type: "h1", content: line.slice(2) });
    else if (line.startsWith("- ")) blocks.push({ type: "li", content: line.slice(2) });
    else if (/^\d+\. /.test(line)) blocks.push({ type: "oli", content: line.replace(/^\d+\. /, "") });
    else if (line.trim() === "") blocks.push({ type: "space" });
    else blocks.push({ type: "p", content: line });
    i++;
  }
  return blocks;
}

function inline(text) {
  const parts = [];
  const regex = /(\*\*.+?\*\*|\$\$.+?\$\$|\$.+?\$)/g;
  let last = 0;
  let m;
  let key = 0;
  while ((m = regex.exec(text))) {
    if (m.index > last) parts.push(text.slice(last, m.index));
    const token = m[0];
    if (token.startsWith("**")) parts.push(<b key={key++} style={{ fontWeight: 600, color: "#f3ede1" }}>{token.slice(2, -2)}</b>);
    else parts.push(<span key={key++} style={{ fontFamily: "Georgia, serif", fontStyle: "italic", color: "#e9c46a" }}>{token.replace(/\$\$?/g, "")}</span>);
    last = m.index + token.length;
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts;
}

function Markdown({ content }) {
  const blocks = renderMarkdown(content);
  return (
    <div>
      {blocks.map((b, idx) => {
        if (b.type === "h1") return <h1 key={idx} style={{ fontSize: 22, fontWeight: 700, margin: "0 0 14px", color: "#f5f1e8", fontFamily: "'Georgia', serif" }}>{b.content}</h1>;
        if (b.type === "h2") return <h2 key={idx} style={{ fontSize: 17, fontWeight: 700, margin: "22px 0 10px", color: "#f5f1e8", fontFamily: "'Georgia', serif" }}>{b.content}</h2>;
        if (b.type === "h3") return <h3 key={idx} style={{ fontSize: 15, fontWeight: 600, margin: "16px 0 6px", color: "#d8d2c4" }}>{b.content}</h3>;
        if (b.type === "li") return <div key={idx} style={{ display: "flex", gap: 8, margin: "4px 0", fontSize: 14.5, lineHeight: 1.7, color: "#c9c3b6" }}><span style={{ color: "#e9c46a" }}>•</span><span>{inline(b.content)}</span></div>;
        if (b.type === "oli") return <div key={idx} style={{ display: "flex", gap: 8, margin: "4px 0", fontSize: 14.5, lineHeight: 1.7, color: "#c9c3b6" }}><span style={{ color: "#e9c46a" }}>—</span><span>{inline(b.content)}</span></div>;
        if (b.type === "code") return <pre key={idx} style={{ background: "#12100c", border: "1px solid #2a271f", borderRadius: 8, padding: "10px 12px", fontSize: 12.5, overflowX: "auto", color: "#d8d2c4", fontFamily: "monospace", margin: "8px 0" }}>{b.content}</pre>;
        if (b.type === "space") return <div key={idx} style={{ height: 4 }} />;
        return <p key={idx} style={{ fontSize: 14.5, lineHeight: 1.75, color: "#c9c3b6", margin: "6px 0", fontFamily: "Georgia, serif" }}>{inline(b.content)}</p>;
      })}
    </div>
  );
}

function QuizCard({ q }) {
  const [open, setOpen] = useState(false);
  return (
    <button
      onClick={() => setOpen(!open)}
      style={{
        display: "block", width: "100%", textAlign: "left", background: "#1c1a15",
        border: `1px solid ${open ? "#e9c46a" : "#2a271f"}`, borderRadius: 10,
        padding: "12px 14px", marginBottom: 10, cursor: "pointer",
      }}
    >
      <div style={{ fontSize: 14, fontWeight: 600, color: "#f0ead9", marginBottom: open ? 8 : 0 }}>{q.question}</div>
      {open && (
        <div style={{ fontSize: 13.5, color: "#c9c3b6", lineHeight: 1.6, paddingTop: 8, borderTop: "1px solid #2a271f", fontFamily: "Georgia, serif" }}>
          {q.answer}
        </div>
      )}
      {!open && <div style={{ fontSize: 12, color: "#6b6658", marginTop: 4 }}>tap to reveal answer</div>}
    </button>
  );
}

function LectureCard({ lecture, onOpen }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div
      style={{
        background: "#1c1a15", border: "1px solid #2a271f", borderRadius: 12,
        padding: "14px 16px", marginBottom: 12,
      }}
    >
      <div onClick={() => onOpen(lecture)} style={{ cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
          <span style={{ fontSize: 11.5, color: "#e9c46a", fontWeight: 600, letterSpacing: 0.2 }}>{lecture.course}</span>
          <span style={{ fontSize: 11.5, color: "#6b6658" }}>{lecture.date}</span>
        </div>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#f5f1e8", marginBottom: 8, fontFamily: "'Georgia', serif" }}>
          {lecture.lecture_title}
        </div>
      </div>
      <button
        onClick={() => setExpanded(!expanded)}
        style={{
          display: "flex", alignItems: "center", gap: 4, background: "none", border: "none",
          color: "#8a8575", fontSize: 12, padding: 0, cursor: "pointer", marginBottom: expanded ? 8 : 0,
        }}
      >
        {expanded ? <ChevronDown size={14} /> : <ChevronRight size={14} />}
        highlights
      </button>
      {expanded && (
        <div style={{ marginBottom: 8 }}>
          {lecture.highlights.slice(0, 3).map((h, i) => (
            <div key={i} style={{ display: "flex", gap: 6, fontSize: 13, color: "#c9c3b6", lineHeight: 1.6, marginBottom: 3 }}>
              <span style={{ color: "#e9c46a" }}>•</span><span>{h}</span>
            </div>
          ))}
        </div>
      )}
      <div onClick={() => onOpen(lecture)} style={{ display: "flex", alignItems: "center", gap: 4, color: "#e9c46a", fontSize: 12.5, fontWeight: 600, cursor: "pointer", marginTop: 4 }}>
        open notes <ChevronRight size={13} />
      </div>
    </div>
  );
}

function LectureDetail({ lecture, onBack }) {
  const [highlightsOpen, setHighlightsOpen] = useState(true);
  return (
    <div style={{ padding: "16px 16px 32px" }}>
      <div onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 4, color: "#8a8575", fontSize: 13, marginBottom: 16, cursor: "pointer" }}>
        <ChevronRight size={14} style={{ transform: "rotate(180deg)" }} /> back
      </div>
      <div style={{ fontSize: 11.5, color: "#e9c46a", fontWeight: 600, marginBottom: 4 }}>{lecture.course}</div>
      <div style={{ fontSize: 20, fontWeight: 700, color: "#f5f1e8", marginBottom: 2, fontFamily: "'Georgia', serif" }}>{lecture.lecture_title}</div>
      <div style={{ fontSize: 12, color: "#6b6658", marginBottom: 20 }}>{lecture.date}</div>

      <div
        style={{
          background: "#1c1a15", border: "1px solid #e9c46a33", borderRadius: 12,
          padding: "12px 16px", marginBottom: 20,
        }}
      >
        <button
          onClick={() => setHighlightsOpen(!highlightsOpen)}
          style={{ display: "flex", alignItems: "center", gap: 6, width: "100%", background: "none", border: "none", cursor: "pointer", padding: 0, color: "#e9c46a", fontSize: 13, fontWeight: 700 }}
        >
          <Sparkles size={14} /> highlights {highlightsOpen ? <ChevronDown size={14} style={{ marginLeft: "auto" }} /> : <ChevronRight size={14} style={{ marginLeft: "auto" }} />}
        </button>
        {highlightsOpen && (
          <div style={{ marginTop: 10 }}>
            {lecture.highlights.map((h, i) => (
              <div key={i} style={{ display: "flex", gap: 6, fontSize: 13.5, color: "#e5dfd0", lineHeight: 1.65, marginBottom: 5 }}>
                <span style={{ color: "#e9c46a" }}>•</span><span>{h}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <Markdown content={lecture.notes} />

      <div style={{ marginTop: 28 }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: "#f5f1e8", marginBottom: 12, fontFamily: "'Georgia', serif" }}>Quiz</div>
        {lecture.quiz.map((q, i) => <QuizCard key={i} q={q} />)}
      </div>
    </div>
  );
}

function Home({ onOpen, lectures }) {
  const sorted = [...lectures].sort((a, b) => new Date(b.date) - new Date(a.date));
  return (
    <div style={{ padding: "16px 16px 8px" }}>
      <div style={{ fontSize: 22, fontWeight: 700, color: "#f5f1e8", marginBottom: 18, fontFamily: "'Georgia', serif" }}>ClassMind</div>
      {sorted.length === 0 && <div style={{ color: "#6b6658", fontSize: 13 }}>No lectures processed yet.</div>}
      {sorted.map((l) => <LectureCard key={l.id} lecture={l} onOpen={onOpen} />)}
    </div>
  );
}

function Courses({ onOpenCourse, lectures }) {
  const counts = {};
  lectures.forEach((l) => { counts[l.course] = (counts[l.course] || 0) + 1; });
  const courseNames = Object.keys(counts);
  return (
    <div style={{ padding: "16px 16px 8px" }}>
      <div style={{ fontSize: 22, fontWeight: 700, color: "#f5f1e8", marginBottom: 18, fontFamily: "'Georgia', serif" }}>Courses</div>
      {courseNames.length === 0 && <div style={{ color: "#6b6658", fontSize: 13 }}>No courses yet.</div>}
      {courseNames.map((c) => {
        const count = counts[c];
        return (
          <div
            key={c}
            onClick={() => onOpenCourse(c)}
            style={{
              background: "#1c1a15", border: "1px solid #2a271f", borderRadius: 12,
              padding: "14px 16px", marginBottom: 10, cursor: "pointer",
              display: "flex", justifyContent: "space-between", alignItems: "center",
            }}
          >
            <div>
              <div style={{ fontSize: 15, fontWeight: 600, color: "#f0ead9" }}>{c}</div>
              <div style={{ fontSize: 12, color: "#6b6658", marginTop: 2 }}>{count} lecture{count !== 1 ? "s" : ""}</div>
            </div>
            <ChevronRight size={16} color="#6b6658" />
          </div>
        );
      })}
    </div>
  );
}

function CourseDetail({ course, onBack, onOpenLecture, lectures }) {
  const filtered = lectures.filter((l) => l.course === course).sort((a, b) => new Date(b.date) - new Date(a.date));
  return (
    <div style={{ padding: "16px 16px 8px" }}>
      <div onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 4, color: "#8a8575", fontSize: 13, marginBottom: 14, cursor: "pointer" }}>
        <ChevronRight size={14} style={{ transform: "rotate(180deg)" }} /> all courses
      </div>
      <div style={{ fontSize: 19, fontWeight: 700, color: "#f5f1e8", marginBottom: 16, fontFamily: "'Georgia', serif" }}>{course}</div>
      {filtered.length === 0 && <div style={{ color: "#6b6658", fontSize: 13 }}>No lectures processed yet.</div>}
      {filtered.map((l) => <LectureCard key={l.id} lecture={l} onOpen={onOpenLecture} />)}
    </div>
  );
}

function Chat() {
  return (
    <div style={{ padding: "16px 16px 8px", display: "flex", flexDirection: "column", minHeight: 420 }}>
      <div style={{ fontSize: 22, fontWeight: 700, color: "#f5f1e8", marginBottom: 18, fontFamily: "'Georgia', serif" }}>Chat</div>
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", padding: "0 24px" }}>
        <div style={{ width: 44, height: 44, borderRadius: "50%", background: "#e9c46a1a", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
          <MessageCircle size={20} color="#e9c46a" />
        </div>
        <div style={{ fontSize: 14.5, color: "#c9c3b6", lineHeight: 1.6 }}>Ask questions about your lectures — coming soon.</div>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", background: "#1c1a15", border: "1px solid #2a271f", borderRadius: 24, padding: "10px 16px" }}>
        <input
          disabled
          placeholder="Ask about a lecture..."
          style={{ flex: 1, background: "none", border: "none", outline: "none", color: "#6b6658", fontSize: 13.5 }}
        />
      </div>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div style={{ minHeight: 400, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10 }}>
      <RefreshCw size={20} color="#e9c46a" style={{ animation: "spin 1s linear infinite" }} />
      <div style={{ fontSize: 13, color: "#8a8575" }}>loading lectures...</div>
    </div>
  );
}

function ErrorScreen({ message, onRetry }) {
  return (
    <div style={{ minHeight: 400, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, padding: "0 24px", textAlign: "center" }}>
      <div style={{ fontSize: 14, color: "#e07a5f", fontWeight: 600 }}>Couldn't reach ClassMind</div>
      <div style={{ fontSize: 12.5, color: "#8a8575", lineHeight: 1.6 }}>{message}</div>
      <button
        onClick={onRetry}
        style={{ marginTop: 6, background: "#1c1a15", border: "1px solid #2a271f", borderRadius: 8, padding: "8px 16px", color: "#e9c46a", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
      >
        Retry
      </button>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("home");
  const [openLecture, setOpenLecture] = useState(null);
  const [openCourse, setOpenCourse] = useState(null);
  const [lectures, setLectures] = useState([]);
  const [status, setStatus] = useState("loading"); // loading | ready | error
  const [errorMsg, setErrorMsg] = useState("");

  const fetchLectures = () => {
    setStatus("loading");
    fetch(`${API_BASE_URL}/api/lectures`)
      .then((res) => {
        if (!res.ok) throw new Error(`Server responded ${res.status}`);
        return res.json();
      })
      .then((data) => {
        setLectures(data);
        setStatus("ready");
      })
      .catch((err) => {
        setErrorMsg(err.message || "Network error");
        setStatus("error");
      });
  };

  useEffect(() => {
    fetchLectures();
  }, []);

  useEffect(() => {
    if (openLecture) {
      const fresh = lectures.find((l) => l.id === openLecture.id);
      if (fresh) setOpenLecture(fresh);
    }
  }, [lectures]);

  const tabs = [
    { id: "home", label: "Home", icon: HomeIcon },
    { id: "courses", label: "Courses", icon: BookOpen },
    { id: "chat", label: "Chat", icon: MessageCircle },
  ];

  const handleTab = (id) => {
    setTab(id);
    setOpenLecture(null);
    setOpenCourse(null);
  };

  let body;
  if (status === "loading") body = <LoadingScreen />;
  else if (status === "error") body = <ErrorScreen message={errorMsg} onRetry={fetchLectures} />;
  else if (openLecture) body = <LectureDetail lecture={openLecture} onBack={() => setOpenLecture(null)} />;
  else if (tab === "home") body = <Home onOpen={setOpenLecture} lectures={lectures} />;
  else if (tab === "courses") body = openCourse
    ? <CourseDetail course={openCourse} onBack={() => setOpenCourse(null)} onOpenLecture={setOpenLecture} lectures={lectures} />
    : <Courses onOpenCourse={setOpenCourse} lectures={lectures} />;
  else if (tab === "chat") body = <Chat />;

  return (
    <div style={{ maxWidth: 400, margin: "0 auto", background: "#151310", minHeight: "100vh", fontFamily: "-apple-system, sans-serif", position: "relative" }}>
      <div style={{ paddingBottom: 70 }}>{body}</div>
      {!openLecture && (
        <div
          style={{
            position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
            width: "100%", maxWidth: 400, background: "#1c1a15",
            borderTop: "1px solid #2a271f", display: "flex",
          }}
        >
          {tabs.map((t) => {
            const IconComp = t.icon;
            const active = tab === t.id;
            return (
              <button
                key={t.id}
                onClick={() => handleTab(t.id)}
                style={{
                  flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                  padding: "10px 0 8px", background: "none", border: "none", cursor: "pointer",
                  color: active ? "#e9c46a" : "#6b6658",
                }}
              >
                <IconComp size={19} />
                <span style={{ fontSize: 10.5, fontWeight: active ? 700 : 500 }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
